<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metalne Konstrukcije</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1a2634">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Konstrukcije">
</head>
<body>

  <header>
    <h1>Metalne Konstrukcije</h1>
  </header>

  <main>

    <!-- Tip -->
    <section class="card">
      <div class="type-row">

        <label class="type-btn">
          <input type="radio" name="tip" value="stub" checked>
          <div class="type-inner">
            <svg viewBox="0 0 100 70">
              <rect x="10" y="12" width="8" height="50" fill="#6c7a86"/>
              <rect x="46" y="12" width="8" height="50" fill="#6c7a86"/>
              <rect x="82" y="12" width="8" height="50" fill="#6c7a86"/>
              <rect x="6"  y="8"  width="88" height="8"  fill="#9eaab5"/>
            </svg>
            <span>Stub + Greda</span>
            <small>Vertikalne cevi + horizontalna greda</small>
          </div>
        </label>

        <label class="type-btn">
          <input type="radio" name="tip" value="lkonzola">
          <div class="type-inner">
            <svg viewBox="0 0 100 70">
              <rect x="0" y="0" width="8" height="70" fill="#b0bec5"/>
              <rect x="8" y="8"  width="6" height="40" fill="#6c7a86"/>
              <rect x="8" y="42" width="35" height="6" fill="#6c7a86"/>
              <rect x="38" y="8" width="6" height="40" fill="#6c7a86"/>
              <rect x="38" y="42" width="35" height="6" fill="#6c7a86"/>
              <rect x="68" y="8" width="6" height="40" fill="#6c7a86"/>
              <rect x="68" y="42" width="26" height="6" fill="#6c7a86"/>
              <rect x="8" y="42" width="86" height="6" fill="#9eaab5" opacity="0.7"/>
            </svg>
            <span>L Konzola</span>
            <small>L nosači na zidu + greda</small>
          </div>
        </label>

      </div>
    </section>

    <!-- Forma -->
    <section class="card">
      <h2>Mere</h2>
      <div id="forma"></div>
    </section>

    <!-- Crtez -->
    <section class="card">
      <div class="card-header">
        <h2>Crtež</h2>
        <button onclick="window.print()">Štampaj / PDF</button>
      </div>
      <div id="crtez"></div>
    </section>

    <!-- Materijal -->
    <section class="card">
      <h2>Materijal</h2>
      <div id="materijal"></div>
    </section>

  </main>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
</body>
</html>
